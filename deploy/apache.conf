# agent-wiki Apache snippet.
#
# Add these directives inside the existing HTTPS VirtualHost (*:443) for
# secorp.net (i.e. /etc/apache2/sites-available/secorp.conf), alongside
# the other prefix-based apps (rssreader, meetingapp, termag, etc).
# They extend the shared VirtualHost — do NOT define a new one.
#
# Requires modules: proxy, proxy_http, headers. (Already enabled on this host.)
#
# The agent-wiki service serves both the React UI and the JSON API itself,
# so a single proxy block is enough — no Alias / DocumentRoot needed.

# agent-wiki — Express on 127.0.0.1:3045, mounted at /wiki
ProxyPreserveHost On
ProxyPass        /wiki  http://127.0.0.1:3045/wiki
ProxyPassReverse /wiki  http://127.0.0.1:3045/wiki

# Forward the protocol so Express marks cookies "secure" correctly when
# sameSite=lax + secure=true is in effect (cookies live behind /wiki).
RequestHeader set X-Forwarded-Proto "https"
